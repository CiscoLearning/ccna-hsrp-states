nodes:
  - boot_disk_size: null
    configuration: []
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
    label: switch
    node_definition: unmanaged_switch
    parameters: {}
    ram: null
    tags: []
    x: 0
    y: 0
    interfaces:
      - id: i0
        label: port0
        mac_address: null
        type: physical
        slot: 0
      - id: i1
        label: port1
        mac_address: null
        type: physical
        slot: 1
      - id: i2
        label: port2
        mac_address: null
        type: physical
        slot: 2
  - boot_disk_size: null
    configuration: |-
      hostname R1
      !
      interface Ethernet0/0
       ip address 192.168.1.2 255.255.255.0
       standby version 2
       standby 1 ip 192.168.1.1
       standby 1 priority 110
       standby 1 preempt
       standby 1 track 1 decrement 20
       no shutdown
      !
      interface Ethernet0/1
       ip address 10.0.1.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/2
       no ip address
       shutdown
      !
      interface Ethernet0/3
       no ip address
       shutdown
      !
      track 1 interface Ethernet0/1 line-protocol
      !
      ip route 10.0.2.0 255.255.255.252 192.168.1.3
      !
      end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n1
    image_definition: iol-xe-17-16-01a
    label: R1
    node_definition: iol-xe
    parameters: {}
    ram: null
    tags: []
    x: -300
    y: -200
    interfaces:
      - id: i0
        label: Ethernet0/0
        mac_address: null
        type: physical
        slot: 0
      - id: i1
        label: Ethernet0/1
        mac_address: null
        type: physical
        slot: 1
      - id: i2
        label: Ethernet0/2
        mac_address: null
        type: physical
        slot: 2
      - id: i3
        label: Ethernet0/3
        mac_address: null
        type: physical
        slot: 3
  - boot_disk_size: null
    configuration: |-
      hostname R2
      !
      interface Ethernet0/0
       ip address 192.168.1.3 255.255.255.0
       standby version 2
       standby 1 ip 192.168.1.1
       standby 1 priority 100
       standby 1 preempt
       no shutdown
      !
      interface Ethernet0/1
       ip address 10.0.2.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/2
       no ip address
       shutdown
      !
      interface Ethernet0/3
       no ip address
       shutdown
      !
      ip route 10.0.1.0 255.255.255.252 192.168.1.2
      !
      end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n2
    image_definition: iol-xe-17-16-01a
    label: R2
    node_definition: iol-xe
    parameters: {}
    ram: null
    tags: []
    x: 300
    y: -200
    interfaces:
      - id: i0
        label: Ethernet0/0
        mac_address: null
        type: physical
        slot: 0
      - id: i1
        label: Ethernet0/1
        mac_address: null
        type: physical
        slot: 1
      - id: i2
        label: Ethernet0/2
        mac_address: null
        type: physical
        slot: 2
      - id: i3
        label: Ethernet0/3
        mac_address: null
        type: physical
        slot: 3
  - boot_disk_size: null
    configuration:
      - name: node.cfg
        content: |-
          hostname client
          USERNAME=cisco
          PASSWORD=cisco
          ip address add 192.168.1.10/24 dev eth0
          ip link set dev eth0 up
          ip route add default via 192.168.1.1
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n3
    image_definition: null
    label: client
    node_definition: alpine
    parameters: {}
    ram: null
    tags: []
    x: 0
    y: 200
    interfaces:
      - id: i0
        label: eth0
        mac_address: null
        type: physical
        slot: 0
  - boot_disk_size: null
    configuration:
      - name: node.cfg
        content: |-
          hostname upstream
          USERNAME=cisco
          PASSWORD=cisco
          ip address add 10.0.1.2/30 dev eth0
          ip link set dev eth0 up
          ip address add 10.0.2.2/30 dev eth1
          ip link set dev eth1 up
          sysctl -w net.ipv4.conf.all.rp_filter=0
          sysctl -w net.ipv4.conf.eth0.rp_filter=0
          sysctl -w net.ipv4.conf.eth1.rp_filter=0
          ip route add 192.168.1.0/24 via 10.0.2.1
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n4
    image_definition: null
    label: upstream
    node_definition: alpine
    parameters: {}
    ram: null
    tags: []
    x: 0
    y: -400
    interfaces:
      - id: i0
        label: eth0
        mac_address: null
        type: physical
        slot: 0
      - id: i1
        label: eth1
        mac_address: null
        type: physical
        slot: 1
